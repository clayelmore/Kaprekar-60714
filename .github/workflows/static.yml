name: Deploy static site to GitHub Pages

on:
  # Run on every push to main
  push:
    branches: ["main"]

  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Single concurrent deployment; cancel in-progress runs in favor of latest
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repo. index.html is at the root.
          # GitHub Pages serves index.html as the homepage at /.
          # Other static files (60714_calculator.html, d6_fps.txt) are served directly.
          # Markdown files are served as raw text; the landing page links to their
          # GitHub-rendered views instead.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
